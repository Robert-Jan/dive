version: "3.8"

services:
    app:
        image: robert-jan/dive:latest
        environment: 
            - "ConnectionStrings__PostgreSQL=Server=dive_db_1; Port=5432; Database=dive; Username=dive; Password=dive;"
        ports:
            - "8080:80"
        volumes:
            - storage:/dive/storage
        networks:
            - network
    db:
        image: postgres:alpine
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: dive
            POSTGRES_PASSWORD: dive
            POSTGRES_DB: dive
        volumes:
            - database:/var/lib/postgresql/data
        networks:
            - network

networks:
    network:
        driver: "bridge"

volumes:
    storage:
        driver: "local"
    database:
        driver: "local"